<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erin's Diary - Erin's Art World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --lavender: #c4b5fd;
      --lavender-light: #ede9fe;
      --lavender-dark: #7c3aed;
      --pink: #f0abfc;
      --sky: #bae6fd;
      --text: #1e1b4b;
      --text-light: #6b7280;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: #faf8ff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0.7rem 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 1px 20px rgba(124, 58, 237, 0.08);
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      transition: all 0.3s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 2px; left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 60%; height: 3px;
      background: var(--lavender-dark);
      border-radius: 2px;
      transition: transform 0.3s;
    }

    nav a.active::after { transform: translateX(-50%) scaleX(1); }
    nav a:hover { color: var(--lavender-dark); }

    /* ========== MAIN ========== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.5rem 2rem;
    }

    .book-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .book-header h1 {
      font-family: 'Gaegu', cursive;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: var(--lavender-dark);
      margin-bottom: 0.4rem;
    }

    .book-header p {
      color: var(--text-light);
      font-size: 1rem;
      margin-bottom: 1.2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .book-buy-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #ff9900, #ffb347);
      color: #111;
      text-decoration: none;
      padding: 0.65rem 1.6rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
    }

    .book-buy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 153, 0, 0.4);
    }

    .book-buy-btn svg { width: 18px; height: 18px; }

    /* ========== TABS ========== */
    .book-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .book-tab-btn {
      border: 2px solid var(--lavender);
      background: transparent;
      color: var(--text);
      padding: 0.45rem 1.4rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Poppins', sans-serif;
    }

    .book-tab-btn:hover {
      border-color: var(--lavender-dark);
      color: var(--lavender-dark);
    }

    .book-tab-btn.active {
      background: var(--lavender-dark);
      border-color: var(--lavender-dark);
      color: #fff;
    }

    /* ========== VIEWER ========== */
    .book-viewer {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 8px 40px rgba(124, 58, 237, 0.1);
      overflow: hidden;
    }

    .book-canvas-wrap {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f6ff;
      padding: 1rem;
    }

    .book-canvas-wrap canvas {
      display: block;
    }

    .book-click-zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 25%;
      cursor: pointer;
      z-index: 2;
      transition: background 0.15s;
    }

    .book-click-zone:active { background: rgba(124, 58, 237, 0.04); }
    .book-click-left { left: 0; }
    .book-click-right { right: 0; }

    .book-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.8rem 1rem;
      border-top: 1px solid var(--lavender-light);
    }

    .book-nav-btn {
      background: var(--lavender-light);
      border: none;
      color: var(--lavender-dark);
      width: 42px; height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-nav-btn:hover {
      background: var(--lavender-dark);
      color: #fff;
    }

    .book-nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: var(--lavender-light);
      color: var(--lavender-dark);
    }

    .book-page-info {
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 500;
      min-width: 80px;
      text-align: center;
    }

    /* ========== FOOTER ========== */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
      font-size: 0.85rem;
      border-top: 1px solid var(--lavender-light);
    }

    footer span {
      font-family: 'Gaegu', cursive;
      font-weight: 700; color: var(--lavender-dark);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      nav { gap: 0.8rem; padding: 0.7rem 1rem; }
      nav a { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
      .book-canvas-wrap { padding: 0.5rem; }
    }

    @media (max-width: 480px) {
      nav a { font-size: 0.75rem; padding: 0.3rem 0.6rem; }
      main { padding-top: 4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="index.html#gallery">Gallery</a>
    <a href="book.html" class="active">Book</a>
  </nav>

  <main>
    <div class="book-header">
      <h1>Erin's Diary</h1>
      <p>A story written and illustrated by Erin, brought to life with a little help from Dad.</p>
      <a href="https://www.amazon.com/dp/B0H5RH5B26" target="_blank" rel="noopener" class="book-buy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg>
        Get it on Amazon
      </a>
    </div>

    <div class="book-tabs">
      <button class="book-tab-btn active" data-pdf="book/erins-diary-cover.pdf">Cover</button>
      <button class="book-tab-btn" data-pdf="book/erins-diary-manuscript.pdf">Read Inside</button>
    </div>

    <div class="book-viewer">
      <div class="book-canvas-wrap" id="bookCanvasWrap">
        <div class="book-click-zone book-click-left" id="bookClickLeft"></div>
        <div class="book-click-zone book-click-right" id="bookClickRight"></div>
        <canvas id="bookCanvas"></canvas>
      </div>
      <div class="book-controls">
        <button class="book-nav-btn" id="bookPrev" aria-label="Previous page">&#8249;</button>
        <span class="book-page-info" id="bookPageInfo">Loading...</span>
        <button class="book-nav-btn" id="bookNext" aria-label="Next page">&#8250;</button>
      </div>
    </div>
  </main>

  <footer>
    <p>Made with love for <span>Erin</span> &hearts;</p>
  </footer>

  <script type="module">
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const canvas = document.getElementById('bookCanvas');
    const ctx = canvas.getContext('2d');
    const pageInfo = document.getElementById('bookPageInfo');
    const prevBtn = document.getElementById('bookPrev');
    const nextBtn = document.getElementById('bookNext');
    const canvasWrap = document.getElementById('bookCanvasWrap');

    let pdfDoc = null;
    let currentPage = 1;
    let rendering = false;

    async function loadPdf(url) {
      currentPage = 1;
      pageInfo.textContent = 'Loading...';
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      try {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        await renderPage(currentPage);
      } catch (err) {
        console.error('PDF load error:', err);
        pageInfo.textContent = 'Error loading PDF';
      }
    }

    async function renderPage(num) {
      if (!pdfDoc || rendering) return;
      rendering = true;

      const page = await pdfDoc.getPage(num);
      const dpr = window.devicePixelRatio || 1;
      const baseViewport = page.getViewport({ scale: 1 });
      const pageRatio = baseViewport.width / baseViewport.height;

      const wrapWidth = canvasWrap.clientWidth - 32;
      const maxHeight = window.innerHeight - 220;
      let displayWidth = wrapWidth;
      let displayHeight = displayWidth / pageRatio;

      if (displayHeight > maxHeight) {
        displayHeight = maxHeight;
        displayWidth = displayHeight * pageRatio;
      }

      const scale = (displayWidth * dpr) / baseViewport.width;
      const viewport = page.getViewport({ scale });

      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';

      await page.render({ canvasContext: ctx, viewport }).promise;

      pageInfo.textContent = `${num} / ${pdfDoc.numPages}`;
      prevBtn.disabled = num <= 1;
      nextBtn.disabled = num >= pdfDoc.numPages;
      rendering = false;
    }

    function goPage(dir) {
      if (!pdfDoc) return;
      const next = currentPage + dir;
      if (next < 1 || next > pdfDoc.numPages) return;
      currentPage = next;
      canvas.style.transition = 'opacity 0.2s';
      canvas.style.opacity = '0';
      setTimeout(() => {
        renderPage(currentPage).then(() => {
          canvas.style.opacity = '1';
        });
      }, 150);
    }

    prevBtn.addEventListener('click', () => goPage(-1));
    nextBtn.addEventListener('click', () => goPage(1));
    document.getElementById('bookClickLeft').addEventListener('click', () => goPage(-1));
    document.getElementById('bookClickRight').addEventListener('click', () => goPage(1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goPage(-1);
      if (e.key === 'ArrowRight') goPage(1);
    });

    document.querySelectorAll('.book-tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.book-tab-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        loadPdf(btn.dataset.pdf);
      });
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (pdfDoc) renderPage(currentPage);
      }, 200);
    });

    loadPdf('book/erins-diary-cover.pdf');
  </script>
</body>
</html>
